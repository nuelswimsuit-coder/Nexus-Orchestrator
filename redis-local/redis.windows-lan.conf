# Nexus: listen on all IPv4 interfaces so remote workers can reach the Master at e.g. 10.100.102.8:6379.
# Requires a strong requirepass (or ACL) + firewall; do not expose to the public Internet.
# Use by setting NEXUS_REDIS_LISTEN_LAN=1 before starting scripts/nexus_launcher.py (bundled redis-server only).
#
# Loaded after the stock template so bind wins.
include redis.windows.conf
bind 0.0.0.0
